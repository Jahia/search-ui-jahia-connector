name: On release
on:
    release:
        types: [published]

jobs:
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        permissions:
          id-token: write  # Required for OIDC
          contents: write
        steps:
        - uses: actions/checkout@v6
- uses: actions/setup-node@v6
          with:
            node-version: '20.x'
        - name: Publish to npm
          run: |
            yarn install
            yarn build
            yarn publish --access public --provenance
