name: On release
on:
    release:
        types: [published]

jobs:
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        permissions:
          id-token: write  # Required for OIDC
          contents: write
        steps:
        - uses: actions/checkout@v6
        - uses: jdx/mise-action@v3
        - name: Publish to npm
          run: |
            yarn install
            yarn build
            yarn publish --access public --provenance
