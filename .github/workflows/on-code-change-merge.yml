name: On code change & merge

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    name: Build module
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - name: Install & build with yarn
        run: |
          yarn install
          yarn build

  test:
    name: Run integration tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - name: test with yarn
        run: |
          yarn install
          yarn test
